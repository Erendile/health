name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t health-api:pr-${{ github.event.pull_request.number }} .

      - name: Smoke test
        run: |
          docker run -d \
            --name health-api-test \
            -p 3000:3000 \
            health-api:pr-${{ github.event.pull_request.number }}

          # Retry until /health returns 200 or fail after 30 seconds
          MAX_RETRIES=15
          RETRY_INTERVAL=2
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
            echo "Attempt $i/$MAX_RETRIES — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep $RETRY_INTERVAL
          done

          echo "Health check failed after $((MAX_RETRIES * RETRY_INTERVAL))s"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop health-api-test || true
          docker rm   health-api-test || true