name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /root/health

            echo "Pulling latest changes..."
            sudo git pull origin main

            echo "Building image..."
            sudo podman build -t health-api:latest .

            echo "Stopping old container..."
            sudo podman stop health-api || true
            sudo podman rm   health-api || true

            echo "Starting new container..."
            sudo podman run -d \
              --name health-api \
              --restart=always \
              -p 3000:3000 \
              health-api:latest

            echo "Deploy successful."